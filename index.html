<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <title>TINO TV MASTER - Versión Móvil v1.0</title>

    <style>
        :root { --neon: #00ffcc; --bg: #000; --card: #121216; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

        body { background: #000; color: #fff; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        /* CABECERA MÓVIL OPTIMIZADA */
        header {
            padding: 12px; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px); border-bottom: 1px solid #1a1a1a;
            position: sticky; top: 0; z-index: 2000;
            display: flex; flex-direction: column; gap: 10px;
        }
        .logo { font-size: 16px; font-weight: 900; color: var(--neon); text-transform: uppercase; text-align: center; letter-spacing: 1px; }

        /* SELECTORES TÁCTILES */
        .nav-controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 100%; }
        .tv-select {
            background: #111; color: #fff; border: 1px solid #333;
            padding: 10px 2px; border-radius: 6px; font-size: 8px; font-weight: 900;
            outline: none; cursor: pointer; text-align: center;
        }

        /* REPRODUCTOR MÓVIL */
        .player-wrapper {
            width: 100%;
            aspect-ratio: 16/11.5; /* Altura para ver video y opciones */
            position: relative;
            background: #000;
            overflow: hidden;
            border-bottom: 2px solid var(--neon);
        }

        /* RSS DE NOTICIAS LENTO (70s) - TAPA LOGO ORIGINAL */
        .mask-top {
            position: absolute; top: 0; left: 0; width: 100%; height: 35px;
            background: rgba(0,0,0,0.9); z-index: 150; display: flex; align-items: center;
            border-bottom: 1px solid var(--neon); overflow: hidden;
        }
        .ticker {
            white-space: nowrap; font-size: 11px; font-weight: 900; color: var(--neon);
            display: inline-block; animation: ticker-move 70s linear infinite;
        }
        @keyframes ticker-move { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        /* LÓGICA DE AISLAMIENTO PARA CABLEVISION EN MÓVIL */
        .player-inner {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transition: all 0.4s ease-in-out;
            z-index: 1;
        }

        /* RECORTE PARA CABLEVISION: MAS ARRIBA, MENOS ABAJO */
        .player-inner.isolation-mode {
            width: 130%;
            height: 195%;
            top: -28%;    /* Revela más parte superior */
            left: -15%;
        }

        iframe { width: 100%; height: 100%; border: none; background: #000; }

        /* ESCUDO DE SEÑAL SEGURA */
        .tv-trigger {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 500;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px;
        }
        .btn-play {
            background: var(--neon); color: #000; border: none;
            padding: 18px 40px; border-radius: 50px; font-weight: 900; font-size: 16px;
            box-shadow: 0 0 25px var(--neon);
        }

        /* PUBLICIDAD INFERIOR */
        .bottom-banner {
            width: 100%; height: 50px; background: #000; border-top: 1px solid #111;
            overflow: hidden; display: flex; align-items: center;
        }
        .bottom-scroll { display: flex; animation: scroll-x 30s linear infinite; }
        .bottom-scroll img { height: 40px; margin: 0 10px; border-radius: 4px; border: 1px solid #222; }
        @keyframes scroll-x { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        footer { padding: 30px; text-align: center; color: #333; font-size: 9px; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">TINO TV MASTER</div>
        <div class="nav-controls">
            <select class="tv-select" id="sel-deportes" onchange="quickPlay(this.value)"><option value="">⚽ DEPORTES</option></select>
            <select class="tv-select" id="sel-tv" onchange="quickPlay(this.value)"><option value="">📺 TV</option></select>
            <select class="tv-select" id="sel-cine" onchange="quickPlay(this.value)"><option value="">🎬 CINE</option></select>
        </div>
    </header>

    <div class="player-wrapper">
        <div class="mask-top"><div class="ticker" id="live-ticker">CONECTANDO CON EL FEED DE NOTICIAS DEPORTIVAS...</div></div>

        <div id="tv-shield" class="tv-trigger">
            <div style="font-size: 40px; margin-bottom: 10px;">🛡️</div>
            <button class="btn-play" onclick="startChannel()">INICIAR SEÑAL SEGURA</button>
            <p style="font-size: 10px; color: #555; margin-top: 15px; font-weight: bold;">ANTI-POPUPS & MALWARE BLOCKED</p>
        </div>

        <div class="player-inner" id="zoom-engine">
            <!-- IFRAME BLINDADO -->
            <iframe id="tv-frame" src=""
                    allowfullscreen
                    allow="autoplay; encrypted-media"
                    sandbox="allow-scripts allow-same-origin allow-forms"
                    referrerpolicy="no-referrer">
            </iframe>
        </div>
    </div>

    <div class="bottom-banner">
        <div class="bottom-scroll" id="ads-strip"></div>
    </div>

    <footer>© 2026 - AGUSTÍN PIZARRO. TODOS LOS DERECHOS RESERVADOS.</footer>

<script src="tino_tv_data.js"></script>
<script>
    let currentUrl = "";

    function setupAds() {
        const strip = document.getElementById('ads-strip');
        let html = "";
        for(let i=1; i<=17; i++) {
            html += `<img src="images/banner${i}.png" onerror="this.src='im%C3%A1genes/banner${i}.png'">`;
        }
        strip.innerHTML = html + html;
    }

    async function updateNews() {
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent("https://www.marca.com/rss/futbol.xml")}`);
            const data = await res.json();
            if (data.status === 'ok') {
                document.getElementById('live-ticker').innerText = data.items.map(item => `⚽ ${item.title.toUpperCase()}`).join(" --- ") + " --- BIENVENIDO A TINO TV MASTER --- ";
            }
        } catch (e) { document.getElementById('live-ticker').innerText = "⚽ BIENVENIDO A TINO TV MASTER MOBILE --- "; }
    }

    function populateSelects(db) {
        const sDep = document.getElementById('sel-deportes'), sTv = document.getElementById('sel-tv'), sCine = document.getElementById('sel-cine');
        db.forEach(canal => {
            const opt = document.createElement('option');
            opt.value = `${canal.source}|${canal.id}`;
            opt.innerText = canal.name;
            if(canal.cat === "DEPORTES") sDep.appendChild(opt);
            else if(canal.cat === "TV ABIERTA") sTv.appendChild(opt);
            else if(canal.cat === "CINE") sCine.appendChild(opt);
        });
    }

    function quickPlay(val) {
        if(!val) return;
        const [source, id] = val.split('|');
        const engine = document.getElementById('zoom-engine');

        if (source === "cablevision") {
            currentUrl = `https://www.cablevisionhd.com/${id}-en-vivo.php`;
            engine.classList.add('isolation-mode');
        } else {
            currentUrl = source === "ksd" ? `https://embed.ksdjugfsddeports.com/embed/${id}.html` : `https://streamx550.com/global1.php?channel=${id}`;
            engine.classList.remove('isolation-mode');
        }

        document.getElementById('tv-frame').src = "";
        document.getElementById('tv-shield').style.display = 'flex';
    }

    function startChannel() {
        if(currentUrl) {
            document.getElementById('tv-frame').src = currentUrl;
            document.getElementById('tv-shield').style.display = 'none';
        }
    }

    window.onload = () => {
        setupAds();
        populateSelects(KSD_CHANNELS);
        updateNews();
        setInterval(updateNews, 900000);
    };
</script>
</body>
</html>
