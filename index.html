<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ffcc">
    <title>TINO TV MASTER PRO v11.6 - Precision Hybrid</title>

    <style>
        :root { --neon: #00ffcc; --bg: #000; --card: #121216; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        html, body { background: #000; color: #fff; width: 100vw; height: 100vh; overflow: hidden; }

        .layout-container { display: grid; grid-template-columns: 240px 1fr; width: 100%; height: 100%; }

        /* BANNER IZQUIERDO */
        .side-banner { background: #000; border-right: 1px solid #1a1a1a; overflow: hidden; height: 100vh; cursor: pointer; }
        .image-scroll { display: flex; flex-direction: column; animation: scroll-up 60s linear infinite; }
        .ad-box { position: relative; width: 100%; border-bottom: 2px solid var(--neon); background: #050505; }
        .ad-box img { width: 100%; height: 350px; object-fit: cover; display: block; }
        @keyframes scroll-up { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }

        /* APP SHELL */
        .app-shell { display: flex; flex-direction: column; height: 100vh; background: #000; overflow-y: auto; }
        header { padding: 12px 20px; background: #000; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 2000; }
        .logo { font-size: 18px; font-weight: 900; color: var(--neon); text-transform: uppercase; }

        .nav-controls { display: flex; gap: 8px; }
        .tv-select { background: #111; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 6px; font-size: 10px; font-weight: bold; outline: none; cursor: pointer; }

        /* REPRODUCTOR MASTER */
        .player-wrapper {
            width: 100%; aspect-ratio: 16/9; position: relative;
            background: #000; overflow: hidden; border-bottom: 2px solid var(--neon);
            flex-shrink: 0;
        }

        /* REPRODUCTOR BASE */
        .player-inner {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            transition: all 0.4s ease-in-out;
        }

        /* MODO AISLAMIENTO (Ajustado para ver más arriba y menos abajo) */
        .player-inner.isolation-mode {
            width: 125%;
            height: 145%;
            transform: translate(-6%, -5%); /* Bajamos el contenido para mostrar el tope y ocultar el fondo */
        }

        iframe { width: 100%; height: 100%; border: none; background: #000; }

        /* MASCARA SUPERIOR (RSS) */
        .mask-top { position: absolute; top: 0; left: 0; width: 100%; height: 45px; background: #000; z-index: 150; display: flex; align-items: center; border-bottom: 1px solid var(--neon); overflow: hidden; }
        .ticker { white-space: nowrap; font-size: 14px; font-weight: 900; color: var(--neon); display: inline-block; animation: ticker-move 45s linear infinite; }
        @keyframes ticker-move { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        .tv-trigger { position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .btn-play { background: var(--neon); color: #000; border: none; padding: 20px 50px; border-radius: 12px; font-weight: 900; font-size: 22px; cursor: pointer; box-shadow: 0 0 40px rgba(0,255,204,0.4); }

        footer { padding: 20px; text-align: center; color: #333; font-size: 11px; font-weight: bold; border-top: 1px solid #111; margin-top: auto; }

        @media (max-width: 900px) { .side-banner { display: none; } .layout-container { grid-template-columns: 100%; } }
    </style>
</head>
<body>

<div class="layout-container">
    <div class="side-banner"><div class="image-scroll" id="left-ads"></div></div>

    <div class="app-shell" id="app-viewport">
        <header>
            <div class="logo">TINO TV MASTER</div>
            <div class="nav-controls">
                <select class="tv-select" id="sel-deportes" onchange="quickPlay(this.value)"><option value="">⚽ DEPORTES</option></select>
                <select class="tv-select" id="sel-tv" onchange="quickPlay(this.value)"><option value="">📺 TV ABIERTA</option></select>
                <select class="tv-select" id="sel-cine" onchange="quickPlay(this.value)"><option value="">🎬 CINE</option></select>
            </div>
        </header>

        <div class="player-wrapper">
            <div class="mask-top"><div class="ticker" id="live-ticker">CONECTANDO NOTICIAS DEPORTIVAS EN VIVO...</div></div>

            <div id="tv-shield" class="tv-trigger">
                <button class="btn-play" id="btn-focus" onclick="startChannel()">▶ CONECTAR SEÑAL</button>
            </div>

            <div class="player-inner" id="zoom-engine">
                <iframe id="tv-frame" src="" allowfullscreen allow="autoplay"></iframe>
            </div>
        </div>

        <footer>&copy; 2026 - Agustín Pizarro. Todos los derechos reservados.</footer>
    </div>
</div>

<script src="tino_tv_data.js"></script>
<script>
    let currentUrl = "";

    function fillAds() {
        const left = document.getElementById('left-ads');
        let lHtml = "";
        for (let i = 1; i <= 17; i++) {
            lHtml += `<div class="ad-box"><img src="images/banner${i}.png"></div>`;
        }
        left.innerHTML = lHtml + lHtml;
    }

    async function updateNews() {
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent("https://www.marca.com/rss/futbol.xml")}`);
            const data = await res.json();
            if (data.status === 'ok') document.getElementById('live-ticker').innerText = data.items.map(item => `⚽ ${item.title.toUpperCase()}`).join(" --- ");
        } catch (e) { }
    }

    function populateSelects(db) {
        const sDep = document.getElementById('sel-deportes'), sTv = document.getElementById('sel-tv'), sCine = document.getElementById('sel-cine');
        db.forEach(canal => {
            const opt = document.createElement('option');
            opt.value = `${canal.source}|${canal.id}`;
            opt.innerText = canal.name;
            if(canal.cat === "DEPORTES") sDep.appendChild(opt);
            else if(canal.cat === "TV ABIERTA") sTv.appendChild(opt);
            else if(canal.cat === "CINE") sCine.appendChild(opt);
        });
    }

    function quickPlay(val) {
        if(!val) return;
        const [source, id] = val.split('|');
        const engine = document.getElementById('zoom-engine');

        // LÓGICA DE URL SEGÚN FUENTE
        if (source === "cablevision") {
            currentUrl = `https://www.cablevisionhd.com/${id}-en-vivo.php`;
            engine.classList.add('isolation-mode'); // Aplicar recorte solo aquí
        } else if (source === "ksd") {
            currentUrl = `https://embed.ksdjugfsddeports.com/embed/${id}.html`;
            engine.classList.remove('isolation-mode'); // No necesita recorte
        } else {
            currentUrl = `https://streamx550.com/global1.php?channel=${id}`;
            engine.classList.remove('isolation-mode');
        }

        document.getElementById('tv-frame').src = "";
        document.getElementById('tv-shield').style.display = 'flex';
        document.getElementById('btn-focus').focus();
    }

    function startChannel() {
        if(currentUrl) { document.getElementById('tv-frame').src = currentUrl; document.getElementById('tv-shield').style.display = 'none'; }
    }

    window.onload = () => {
        fillAds(); populateSelects(KSD_CHANNELS); updateNews();
        setInterval(updateNews, 900000);
    };
</script>
</body>
</html>
